<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Remix Studio | Let’s Make Something Fun!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  
  <div class="app-background">
    <div class="floaty-shape shape-1"></div>
    <div class="floaty-shape shape-2"></div>
    <div class="floaty-shape shape-3"></div>
  </div>

  <div class="app-container">
    <header class="main-header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">🎨</div>
          <span class="logo-text">Eco Remix Studio</span>
        </div>
        <div class="user-stats">
          <span>Coins: <strong id="coinCount">0</strong></span>
          <span class="stat-dot"></span>
          <span>Streak: <strong id="streakCount">0-day</strong></span>
        </div>
      </div>
    </header>

    <main class="page-content">
      <!-- 1. Fun Hero -->
      <section class="hero-card">
        <h1>Let’s Make Something Fun! 🎨</h1>
        <p>Turn your old stuff into magic creations! It's super easy and fun!</p>
        
        <div class="magic-input-box">
          <input type="text" id="aiInput" placeholder="Tell us something special (like 'make it sparkly!')">
          <button id="generateBtn" class="pill-btn primary-btn">Show Me Magic! ✨</button>
        </div>
        
        <div id="aiStatus" class="status-msg"></div>
        <div id="webllmProgress" class="loading-bar-wrap" style="display: none;">
          <small id="webllmText">Waking up the Magic Brain... 🧠</small>
          <div class="track"><div id="webllmFill" class="fill"></div></div>
        </div>
      </section>

      <!-- 2. Kid's Workshop -->
      <section class="workshop-section">
        <div class="magic-card">
          <div class="card-grid">
            <div class="input-item">
              <label>What do you have? 📦</label>
              <select id="materialType">
                <option value="cardboard">Cardboard Boxes</option>
                <option value="plastic-bottle">Plastic Bottles</option>
                <option value="old-fabric">Old Clothes/Fabric</option>
                <option value="glass-jar">Glass Jars</option>
                <option value="tin-can">Tin Cans</option>
              </select>
            </div>
            <div class="input-item">
              <label>What do you want to make? 🏠</label>
              <select id="projectGoal">
                <option value="storage">Stuff Holder</option>
                <option value="decor">Pretty Decoration</option>
                <option value="garden">Garden Fun</option>
                <option value="fashion">Cool Accessories</option>
              </select>
            </div>
            <div class="input-item">
              <label>Upload your project 📸</label>
              <label class="camera-btn">
                <input type="file" id="imageInput">
                <span>Snap a Photo</span>
              </label>
            </div>
            <div class="input-item">
              <label>How did you do? ⭐</label>
              <button id="reviewBtn" class="pill-btn secondary-btn">Review My Work!</button>
            </div>
          </div>
          <div class="preview-area">
            <div id="materialPreview" class="pic-preview"></div>
            <div id="reviewResult" class="expert-feedback-box" style="display:none"></div>
          </div>
        </div>
      </section>

      <!-- 3. Fun Ideas -->
      <section class="ideas-section">
        <h2 class="section-title">Fun Ideas for You! 💡</h2>
        <div id="ideas" class="ideas-grid"></div>
      </section>

      <!-- 4. Toolkit -->
      <section class="tools-section">
        <h2 class="section-title">Your Tools 🧰</h2>
        <div id="marketGrid" class="tools-scroll"></div>
      </section>
    </main>
  </div>

  <dialog id="tutorialModal" class="fun-modal">
    <div class="modal-card">
      <header class="modal-head">
        <h2 id="tutorialTitle">Project Planner</h2>
        <button id="closeModalBtn">✕</button>
      </header>
      <div id="tutorialLoading" class="modal-loader" style="display:none">
        <div class="spinner"></div>
        <p>Finding the easy steps for you...</p>
      </div>
      <div id="tutorialContent" class="modal-body"></div>
    </div>
  </dialog>

  <!-- State Tracking (Hidden) -->
  <div style="display:none">
    <input type="file" id="finalInput">
    <div id="finalPreview"></div>
    <span id="projectCount">0</span>
    <span id="favoriteCategory"></span>
    <span id="lastScore"></span>
    <div id="ownedTemplates"></div>
    <div id="rating"></div>
    <button id="rateBtn"></button>
    <span id="aiFeedbackStatus"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
