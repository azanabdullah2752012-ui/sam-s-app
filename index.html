<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Remix Studio | NeoLab Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20">
</head>
<body>
  
  <div class="app-background">
    <!-- Cinematic planetary background elements -->
    <div class="planet-glow"></div>
    <div class="fog-layer"></div>
    <div class="stars"></div>
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
  </div>

  <div class="app-container">
    <header class="main-header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12l5.25 5 5.25-5-5.25-5z"/><path d="M12.5 12l5.25 5 5.25-5-5.25-5z"/></svg>
          </div>
          <div class="logo-text-wrapper">
            <span class="logo-text">Eco Remix Studio</span>
            <span class="logo-subtext">NEO LAB</span>
          </div>
        </div>

        <nav class="top-nav">
          <a href="#" class="active">Home</a>
          <a href="#">Projects</a>
          <a href="#">Toolkit</a>
          <a href="#">My Progress</a>
          <a href="#">About</a>
        </nav>

        <div class="user-stats">
          <div class="stat-badge">
            <span class="stat-icon coin-icon">S</span>
            <span>Coins: <strong id="coinCount">0</strong></span>
          </div>
          <div class="stat-badge streak-badge">
            <span class="stat-icon flame-icon">🔥</span>
            <span>Streak: <strong id="streakCount">0-day</strong></span>
          </div>
        </div>
      </div>
    </header>

    <main class="page-content">
      <section class="simple-hero">
        <h1>Fun DIY Projects! <span class="hero-icon">🎨</span></h1>
        <p>
          <svg class="sparkle-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/></svg>
          Pick what you have and find something cool to make!
          <svg class="sparkle-icon right" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/></svg>
        </p>
      </section>

      <section class="workshop-section">
        <div class="magic-card">
          <h2 class="card-heading">1. Pick Your Stuff <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg></h2>
          
          <div class="card-grid">
            <div class="input-item">
              <label>What do you have?</label>
              <div class="select-wrapper">
                <svg class="select-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                <select id="materialType">
                  <option value="cardboard">Cardboard Boxes</option>
                  <option value="plastic-bottle">Plastic Bottles</option>
                  <option value="old-fabric">Old Clothes/Fabric</option>
                  <option value="glass-jar">Glass Jars</option>
                  <option value="tin-can">Tin Cans</option>
                </select>
              </div>
            </div>
            
            <div class="input-item">
              <label>What do you want to make?</label>
              <div class="select-wrapper">
                <svg class="select-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                <select id="projectGoal">
                  <option value="storage">Stuff Holder</option>
                  <option value="decor">Pretty Decoration</option>
                  <option value="garden">Garden Fun</option>
                  <option value="fashion">Cool Accessories</option>
                </select>
              </div>
            </div>
            
            <div class="input-item full-width">
              <label>2. Search for something... <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></label>
              <div class="magic-input-box">
                <input type="text" id="aiInput" placeholder="Enter a word (like 'mask' or 'planter')">
              </div>
            </div>
          </div>

          <h2 class="card-heading mid-heading">3. Choose Your Action! <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg></h2>
          
          <div class="action-row">
            <button id="generateBtn" class="pill-btn primary-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2v1"/><path d="M12 7a5 5 0 0 0-5 5c0 2 1.5 3 2 4 .5.8 1 1.5 1 2.5v1h4v-1c0-1 .5-1.7 1-2.5 1.5-1 2-2 2-4a5 5 0 0 0-5-5z"/></svg>
              Get Project Ideas!
            </button>
            <div class="btn-divider">or</div>
            <div class="review-group">
              <label class="camera-btn">
                <input type="file" id="imageInput">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span>Snap Photo</span>
              </label>
              <button id="reviewBtn" class="pill-btn secondary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                Review My Work!
              </button>
            </div>
          </div>

          <!-- AI Progress (Only shows when Reviewing) -->
          <div id="webllmProgress" class="loading-bar-wrap" style="display:none; margin-top:32px;">
            <div id="aiStatus" class="status-msg">Initializing NeoLab Scanner...</div>
            <div class="track"><div id="webllmFill" class="fill"></div></div>
          </div>

          <div class="preview-area">
            <div id="materialPreview" class="pic-preview"></div>
            <div id="reviewResult" class="expert-feedback-box" style="display:none"></div>
          </div>
        </div>
      </section>

      <section id="resultsSection" class="ideas-section" style="display:none">
        <h2 class="section-title">Projects for You! 💡</h2>
        <div id="ideas" class="ideas-grid"></div>
      </section>

      <section class="tools-section">
        <div class="section-header">
          <svg class="sparkle-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/></svg>
          <h2 class="section-title">Your Tools <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect x="2" y="6" width="20" height="14" rx="2"/></svg></h2>
        </div>
        <div id="marketGrid" class="tools-scroll"></div>
      </section>
    </main>
  </div>

  <dialog id="tutorialModal" class="fun-modal">
    <div class="modal-card">
      <header class="modal-head">
        <h2 id="tutorialTitle">Project Planner</h2>
        <button id="closeModalBtn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </header>
      <div id="tutorialContent" class="modal-body"></div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
