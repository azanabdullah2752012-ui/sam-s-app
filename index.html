<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Remix Studio | Simple AI Workshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  
  <div class="app-container">
    <!-- Clean Header -->
    <header class="navbar">
      <div class="nav-content">
        <div class="logo-area">
          <div class="brand-icon">🌱</div>
          <span class="brand-name">Eco Remix Studio</span>
        </div>
        <div class="stats-pill">
          <span>Coins: <strong id="coinCount">0</strong></span>
          <span class="divider">|</span>
          <span>Streak: <strong id="streakCount">0-day</strong></span>
        </div>
      </div>
    </header>

    <main class="single-column-flow">
      <!-- 1. Hero & AI Input -->
      <section class="hero-minimal">
        <h1>Tomorrow is for the Taking</h1>
        <p>A simple space to turn your recyclables into high-end creations.</p>
        
        <div class="main-input-group">
          <input type="text" id="aiInput" placeholder="Describe your vision (optional)...">
          <button id="generateBtn" class="primary-hero-btn">AI REMIX ➔</button>
        </div>
        
        <div id="aiStatus" class="ai-status-msg"></div>
        <div id="webllmProgress" class="progress-wrap" style="display: none;">
          <small id="webllmText">Readying Studio...</small>
          <div class="p-bar"><div id="webllmFill"></div></div>
        </div>
      </section>

      <!-- 2. The Workshop (Functional Selection) -->
      <section class="simple-workshop">
        <div class="workshop-card">
          <div class="tool-row">
            <div class="tool-cell">
              <label>Material</label>
              <select id="materialType">
                <option value="mixed">Mixed Recyclables</option>
                <option value="cardboard">Cardboard</option>
                <option value="plastic-bottle">Plastic Bottles</option>
                <option value="glass-jar">Glass Jars</option>
                <option value="old-fabric">Old Fabric</option>
              </select>
            </div>
            <div class="tool-cell">
              <label>Goal</label>
              <select id="projectGoal">
                <option value="storage">Storage & Org</option>
                <option value="decor">Home Decor</option>
                <option value="garden">Garden & Outdoor</option>
                <option value="fashion">Eco-Fashion</option>
              </select>
            </div>
            <div class="tool-cell">
              <label>Material Photo</label>
              <label class="file-trigger">
                <input type="file" id="imageInput">
                <span>📸 Upload</span>
              </label>
            </div>
            <div class="tool-cell">
              <label>Final Build</label>
              <label class="file-trigger secondary">
                <input type="file" id="finalInput">
                <span>✅ Finish</span>
              </label>
            </div>
          </div>
          <div class="previews-row">
            <div id="materialPreview"></div>
            <div id="finalPreview"></div>
          </div>
        </div>
      </section>

      <!-- 3. AI Results -->
      <section class="results-area">
        <h2 class="section-title">Your Remix Ideas</h2>
        <div id="ideas" class="clean-grid"></div>
      </section>

      <!-- 4. Marketplace Lounge -->
      <section class="marketplace-area">
        <h2 class="section-title">Premium Templates</h2>
        <div id="marketGrid" class="horizontal-market-scroll">
          <!-- Marketplace items render here -->
        </div>
      </section>
    </main>
  </div>

  <dialog id="tutorialModal" class="simple-modal">
    <div class="modal-inner">
      <header class="modal-top">
        <h2 id="tutorialTitle">Instructions</h2>
        <button id="closeModalBtn">✕</button>
      </header>
      <div id="tutorialLoading" class="loading-state" style="display:none">
        <div class="loader"></div>
        <p>AI is writing...</p>
      </div>
      <div id="tutorialContent" class="modal-body"></div>
    </div>
  </dialog>

  <!-- Hidden state trackers -->
  <div style="display:none">
    <span id="projectCount">0</span>
    <span id="favoriteCategory"></span>
    <span id="lastScore"></span>
    <div id="ownedTemplates"></div>
    <div id="rating"></div>
    <button id="rateBtn"></button>
    <span id="aiFeedbackStatus"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
