<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Remix Studio | Fun AI Workshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  
  <div class="app-container">
    <!-- Super Clean Header -->
    <header class="navbar">
      <div class="nav-content">
        <div class="logo-area">
          <div class="brand-icon">🎨</div>
          <span class="brand-name">Eco Remix Studio</span>
        </div>
        <div class="stats-pill">
          <span>Coins: <strong id="coinCount">0</strong></span>
          <span class="divider">|</span>
          <span>Streak: <strong id="streakCount">0-day</strong></span>
        </div>
      </div>
    </header>

    <main class="single-column-flow">
      <!-- 1. Fun Hero -->
      <section class="hero-minimal fun-mode">
        <h1>Tomorrow is for the Taking</h1>
        <p>Turn your recyclables into magic creations! ✨</p>
        
        <div class="main-input-group">
          <input type="text" id="aiInput" placeholder="Add a secret ingredient (e.g. 'extra glitter')">
          <button id="generateBtn" class="primary-hero-btn fun-btn">REMIX MAGIC ✨</button>
        </div>
        
        <div id="aiStatus" class="ai-status-msg"></div>
        <div id="webllmProgress" class="progress-wrap" style="display: none;">
          <small id="webllmText">Starting AI Brain...</small>
          <div class="p-bar"><div id="webllmFill"></div></div>
        </div>
      </section>

      <!-- 2. Simple Workshop -->
      <section class="simple-workshop">
        <div class="workshop-card fun-card">
          <div class="tool-row">
            <div class="tool-cell">
              <label>Select Material</label>
              <select id="materialType">
                <option value="mixed">Mixed Stuff</option>
                <option value="cardboard">Cardboard</option>
                <option value="plastic-bottle">Plastic Bottles</option>
                <option value="old-fabric">Old Fabric</option>
              </select>
            </div>
            <div class="tool-cell">
              <label>What's the Goal?</label>
              <select id="projectGoal">
                <option value="storage">Storage Box</option>
                <option value="decor">Cool Decor</option>
                <option value="garden">Garden Fun</option>
                <option value="fashion">Eco Wear</option>
              </select>
            </div>
            <div class="tool-cell">
              <label>Photo</label>
              <label class="file-trigger fun-trigger">
                <input type="file" id="imageInput">
                <span>📸 Snap</span>
              </label>
            </div>
            <div class="tool-cell">
              <label>Done?</label>
              <label class="file-trigger secondary fun-trigger-blue">
                <input type="file" id="finalInput">
                <span>✅ Finish</span>
              </label>
            </div>
          </div>
          <div class="previews-row">
            <div id="materialPreview"></div>
            <div id="finalPreview"></div>
          </div>
        </div>
      </section>

      <!-- 3. Results -->
      <section class="results-area">
        <h2 class="section-title">Magical Remixes</h2>
        <div id="ideas" class="clean-grid"></div>
      </section>

      <!-- 4. Marketplace -->
      <section class="marketplace-area">
        <h2 class="section-title">Premium Blueprints</h2>
        <div id="marketGrid" class="horizontal-market-scroll"></div>
      </section>
    </main>
  </div>

  <dialog id="tutorialModal" class="simple-modal fun-modal">
    <div class="modal-inner">
      <header class="modal-top">
        <h2 id="tutorialTitle">Magic Instructions</h2>
        <button id="closeModalBtn">✕</button>
      </header>
      <div id="tutorialLoading" class="loading-state" style="display:none">
        <div class="loader-fun"></div>
        <p>AI is writing points...</p>
      </div>
      <div id="tutorialContent" class="modal-body points-mode"></div>
    </div>
  </dialog>

  <!-- State logic -->
  <div style="display:none">
    <span id="projectCount">0</span>
    <span id="favoriteCategory"></span>
    <span id="lastScore"></span>
    <div id="ownedTemplates"></div>
    <div id="rating"></div>
    <button id="rateBtn"></button>
    <span id="aiFeedbackStatus"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
